<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Polar & Panda | Finalizar compra</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/checkout.css">

</head>

<body>

<div id="navbar"></div>

<section class="checkout py-5 mt-5">

<div class="container">

<div class="row g-5">

<!-- ===============================
FORMULARIO
================================ -->

<div class="col-lg-8">

<div class="checkout-card">

<h2 class="mb-4">

🧸 Finalizar compra

</h2>

<hr>

<h5 class="mb-3">

Datos del cliente

</h5>

<div class="row">

<div class="col-md-6 mb-3">

<label>Nombre</label>

<input
id="nombreCliente"
type="text"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Correo</label>

<input
id="correoCliente"
type="email"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Teléfono</label>

<input
id="telefonoCliente"
type="text"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>DNI</label>

<input
id="dniCliente"
type="text"
class="form-control">

</div>

</div>

<hr>

<h5 class="mb-3">

📍 Dirección

</h5>

<input
id="direccionCliente"
class="form-control mb-3"
placeholder="Dirección">

<div class="row">

<div class="col-md-4">

<input
id="departamento"
class="form-control"
placeholder="Departamento">

</div>

<div class="col-md-4">

<input
id="provincia"
class="form-control"
placeholder="Provincia">

</div>

<div class="col-md-4">

<input
id="distrito"
class="form-control"
placeholder="Distrito">

</div>

</div>

<hr class="my-4">

<h5>

💳 Forma de pago

</h5>

<select
id="tipoPago"
class="form-select mb-4">

<option value="tarjeta">

Tarjeta

</option>

<option value="yape">

Yape

</option>

<option value="plin">

Plin

</option>

<option value="contra">

Pago contra entrega

</option>

</select>

<div id="contenidoPago">

</div>

<button
id="btnConfirmarCompra"
class="btn-primary-custom w-100 mt-4">

✨ Confirmar compra

</button>

</div>

</div>

<!-- ==========================
RESUMEN
========================== -->

<div class="col-lg-4">

<div class="checkout-card sticky-top">

<h4>

🛍 Resumen

</h4>

<hr>

<div id="resumenCheckout">

</div>

<hr>

<h3 id="totalCheckout">

S/0.00

</h3>

</div>

</div>

</div>

</div>

</section>

<div id="footer"></div>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/alertas.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Datos -->
<script src="js/productos.js"></script>
<script src="js/tienda.js"></script>
<!-- Componentes -->
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/carritoComponent.js"></script>
<script src="js/favoritosComponent.js"></script>

<!-- Lógica -->
<script src="js/carrito.js"></script>
<script src="js/favoritos.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/giftbox.js"></script>

<!-- Pago y Checkout -->
<script src="js/pago.js"></script>
<script src="js/checkout.js"></script>

</body>

</html>
